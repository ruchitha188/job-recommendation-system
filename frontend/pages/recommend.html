<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Get Recommendations | CareerPath AI</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="logo">🎯 CareerPath AI</div>
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="recommend.html">Get Recommendations</a></li>
      <li><a href="career-path.html">Career Path</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>📋 Get Job Recommendations</h1>
    <p>Tell us about yourself and we'll match you with the best job roles</p>
  </div>

  <div class="form-container">
    <h2>Your Profile</h2>
    <div id="errorMsg" style="color:red; margin-bottom:12px;"></div>

    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="e.g. Ravi Kumar"/>

    <label for="skills">Current Skills (comma-separated)</label>
    <input type="text" id="skills" placeholder="e.g. Python, Machine Learning, SQL"/>

    <label for="experience">Years of Experience</label>
    <select id="experience">
      <option value="0">Fresher (0 years)</option>
      <option value="1">1–2 years</option>
      <option value="3">3–5 years</option>
      <option value="5">5+ years</option>
    </select>

    <label for="dreamJob">Dream Job Title</label>
    <input type="text" id="dreamJob" placeholder="e.g. AI Engineer, Data Scientist"/>

    <label for="interests">Your Interests / Domains</label>
    <textarea id="interests"
      placeholder="e.g. I enjoy working with data, building models..."></textarea>

    <button class="btn-submit" onclick="getRecommendations()">
      🔍 Get Recommendations
    </button>
  </div>

  <!-- Results appear here after form submission -->
  <div class="results" id="resultsSection" style="display:none;">
    <h2 style="text-align:center; color:#1a1a2e; margin-bottom:24px;">
      Recommended Jobs For You
    </h2>
    <div class="gap-grid" id="gapAnalysis"></div>
    <div id="jobResults" style="margin-top:32px;"></div>
    <div style="text-align:center; margin-top:32px;">
      <a href="career-path.html" class="btn-primary">View Your Career Path →</a>
    </div>
  </div>

  <footer><p>© 2025 CareerPath AI</p></footer>
  <script src="../js/main.js"></script>
  <script src="../js/recommend.js"></script>
</body>
</html>
